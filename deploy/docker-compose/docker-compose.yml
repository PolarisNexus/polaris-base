# ==================================================
# polaris-base 平台底座入口
#
# 启动（全量）:       docker compose up -d
# 按 plane 启动：     COMPOSE_PROFILES=data docker compose up -d
# 按 plane 过滤视图： docker ps --filter label=com.docker.compose.project=polaris-base --filter label=polaris.plane=data
# 按 role 过滤视图：  docker ps --filter label=com.docker.compose.project=polaris-base --filter label=polaris.role=cache
#
# 默认 .env 激活 data + platform + services 全部 profile。
# plane / role 元数据在每个组件 compose 中以 labels 声明，组件目录保持扁平。
# ==================================================

name: polaris-base

include:
  # ---------- data plane ----------
  - path: ../../components/postgres/docker-compose.yml
  - path: ../../components/redis/docker-compose.yml
  - path: ../../components/elastic/docker-compose.yml
  - path: ../../components/minio/docker-compose.yml
  # ---------- platform plane ----------
  - path: ../../components/apisix/docker-compose.yml
  - path: ../../components/casdoor/docker-compose.yml
  - path: ../../components/observability/docker-compose.yml
  # safeline: WAF 暂缓接入（ADR-0006）
  # ---------- services plane（自研共享服务，首个立项时启用）----------
  # - path: ../../services/<service>/docker-compose.yml

networks:
  polaris-net:
    name: polaris-net

# ==================================================
# polaris-base 一键启动入口
# 通过 include 引用各组件独立编排，注释掉某行即可跳过该组件
#
# 首次使用:
#   cp .env.example .env   # 然后修改密码
#   docker compose up -d
#
# 生成完整合并配置:
#   docker compose config > docker-compose.full.yml
# ==================================================

name: polaris-base

include:
  # ---------- 基础设施层 ----------
  - path: ../../infra/postgres/docker-compose.yml
    env_file: .env
  - path: ../../infra/redis/docker-compose.yml
    env_file: .env
  - path: ../../infra/elasticsearch/docker-compose.yml
    env_file: .env
  - path: ../../infra/minio/docker-compose.yml
    env_file: .env
  # ---------- 公共基座层 ----------
  - path: ../../infra/apisix/docker-compose.yml
    env_file: .env
  - path: ../../infra/casdoor/docker-compose.yml
    env_file: .env

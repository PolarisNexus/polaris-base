# ==================================================
# polaris-base-commons 公共能力层入口
#
# 启动：docker compose up -d
# 配套数据底座：../polaris-base-data（另一仓库）
# 组合启动：在仓库根目录运行 make up（同时启动本仓 + data 仓）
# ==================================================

name: polaris-base-commons

include:
  # ---------- 可观测性 ----------
  - path: ../../components/observability/docker-compose.yml
  # ---------- 网关 / IAM / WAF ----------
  - path: ../../components/apisix/docker-compose.yml
  - path: ../../components/casdoor/docker-compose.yml
  # ---------- 自研共享服务（services/，首个立项时启用）----------
  # - path: ../../services/<service>/docker-compose.yml

networks:
  polaris-net:
    name: polaris-net

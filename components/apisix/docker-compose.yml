services:
  apisix:
    image: apache/apisix:3.11.0-debian
    restart: unless-stopped
    volumes:
      - ./config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ../../scripts/healthcheck/apisix.sh:/usr/local/bin/healthcheck.sh:ro
    ports:
      - "${APISIX_HTTP_PORT:-9080}:9080"
      - "${APISIX_HTTPS_PORT:-9443}:9443"
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-apisix
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 5

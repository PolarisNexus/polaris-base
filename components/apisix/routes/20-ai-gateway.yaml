# AI Gateway 路由（ADR-0014 Phase I MVP）
#
# URL 模式：/ai/v1/<provider>/{chat/completions,embeddings}
# 每条路由一个 ai-proxy 插件（provider 各异），其它共享配置
# （openid-connect + elasticsearch-logger）在 21-ai-oidc-service.yaml 的
# service `ai-gateway-shared` 里，通过 service_id 引用。
#
# dev 阶段所有 override.endpoint 指向 base-ai-mock 冒烟；
# 生产 apply 时把 endpoint 换成真实 provider + 注入真实 API key。
# API key 明文占位符入 etcd（Phase III 走 secret:// + Vault，ADR-0007）。

routes:
  # -------------------- OpenAI --------------------
  - id: ai-openai-chat
    uri: /ai/v1/openai/chat/completions
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: openai
        auth:
          header:
            Authorization: "Bearer sk-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

  - id: ai-openai-embeddings
    uri: /ai/v1/openai/embeddings
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: openai
        auth:
          header:
            Authorization: "Bearer sk-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

  # -------------------- Claude / Anthropic --------------------
  # URL 路径用 `claude`（用户习惯），插件 provider 是 `anthropic`（APISIX schema enum）
  - id: ai-claude-chat
    uri: /ai/v1/claude/chat/completions
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: anthropic
        auth:
          header:
            x-api-key: "sk-ant-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

  # -------------------- DeepSeek --------------------
  - id: ai-deepseek-chat
    uri: /ai/v1/deepseek/chat/completions
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: deepseek
        auth:
          header:
            Authorization: "Bearer sk-deepseek-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

  # -------------------- Qwen（经 DashScope OpenAI 兼容接口） --------------------
  # 生产 endpoint: https://dashscope.aliyuncs.com/compatible-mode
  - id: ai-qwen-chat
    uri: /ai/v1/qwen/chat/completions
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: openai-compatible
        auth:
          header:
            Authorization: "Bearer sk-qwen-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

  - id: ai-qwen-embeddings
    uri: /ai/v1/qwen/embeddings
    methods: [POST]
    service_id: ai-gateway-shared
    plugins:
      ai-proxy:
        provider: openai-compatible
        auth:
          header:
            Authorization: "Bearer sk-qwen-dev-mock-no-real-key"
        override:
          endpoint: "http://base-ai-mock:8080"

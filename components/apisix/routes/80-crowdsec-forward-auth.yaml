# CrowdSec bouncer 生效（ADR-0012 行为层 P2）
#
# 每请求先调 services/crowdsec-bouncer 的 /check，403 直接挡，200 继续走 Coraza + 业务。
# bouncer 内存缓存 LAPI decisions，10s 增量刷新；单请求延迟实测 <1ms。
#
# 客户端 IP 解析：APISIX 默认用 TCP 源地址（$remote_addr）做 $http_x_forwarded_for 的值，
# 生产部署在 LB / CDN 后面时，需要在 config.yaml 配 nginx real_ip：
#   nginx_config.http.real_ip_header: X-Forwarded-For
#   nginx_config.http.real_ip_from:
#     - 10.0.0.0/8       # 信任的上游网段
#     - 172.16.0.0/12
# 否则 bouncer 看到的永远是 LB 的地址，CrowdSec 的决策失效。
#
# 调整路径（ADR-0002）：编辑本文件 → PR → CI apply → etcd。
# 临时停用整个 WAF 行为层：删除或注释本 global_rule，然后 apply。
global_rules:
  - id: crowdsec-forward-auth
    plugins:
      forward-auth:
        uri: http://base-crowdsec-bouncer:8080/check
        # 仅把定位客户端 IP 需要的头透传给 bouncer，其他保持最小集
        request_headers:
          - X-Forwarded-For
          - X-Real-IP
          - X-Original-Forwarded-For
        # bouncer 拦截时把自定义头透传到客户端，方便调试/监控
        client_headers:
          - X-Polaris-Bouncer
          - X-Polaris-Bouncer-Scenario
        # bouncer 不可达时 fail-open：网关功能优先（ADR-0012 可用性优于风控）
        # 若要 fail-closed，去掉 keepalive、把 timeout 降低并靠错误日志告警
        timeout: 2000
        keepalive: true
        keepalive_timeout: 60000
        keepalive_pool: 10

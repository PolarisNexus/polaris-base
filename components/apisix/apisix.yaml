# APISIX Standalone 模式声明式路由配置
# 文档: https://apisix.apache.org/docs/apisix/deployment-modes/#standalone
#
# 此文件挂载到容器 /usr/local/apisix/conf/apisix.yaml
# 修改后 APISIX 自动热加载，无需重启

routes:
  # ---------- 健康检查 ----------
  # 使用 fault-injection 直接返回 200，不依赖任何 upstream，
  # 供容器 healthcheck 和外部存活探测使用
  - id: health
    uri: /health
    plugins:
      fault-injection:
        abort:
          http_status: 200
          body: "ok\n"

  # ---------- Casdoor ----------
  # 注意：upstream 使用 compose 服务名（不是 container_name），
  # 服务名是 compose 默认网络的稳定别名，改 container_name 前缀不影响这里
  - id: casdoor
    uri: /casdoor/*
    upstream:
      type: roundrobin
      nodes:
        "casdoor:8000": 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/casdoor/(.*)", "/$1"]

  # ---------- 示例：产品服务路由（占位） ----------
  # - id: example-service
  #   uri: /api/example/*
  #   upstream:
  #     type: roundrobin
  #     nodes:
  #       "example-service:8080": 1

services:
  casdoor:
    image: casbin/casdoor:2.404.0
    restart: unless-stopped
    environment:
      RUNNING_IN_DOCKER: "true"
      driverName: postgres
      # host 使用 polaris-net 别名 base-postgres（PG 在 polaris-base-data 仓，跨 compose）
      dataSourceName: "user=${POSTGRES_USER:-polaris} password=${POSTGRES_PASSWORD:-changeme} host=base-postgres port=5432 sslmode=disable dbname=${CASDOOR_DB:-casdoor}"
    ports:
      - "${CASDOOR_PORT:-8000}:8000"
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-casdoor
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

services:
  otel-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    restart: unless-stopped
    profiles: ["platform"]
    labels:
      polaris.plane: platform
      polaris.role: observability
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${OTEL_ELASTIC_PASSWORD:-E^3bT6*kM9&cW2$$z}
      - ES_JAVA_OPTS=${OTEL_ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - otel_elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-otel-elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  otel-elasticsearch-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    restart: "no"
    profiles: ["platform"]
    labels:
      polaris.plane: platform
      polaris.role: observability
    depends_on:
      otel-elasticsearch:
        condition: service_healthy
    environment:
      OTEL_ELASTIC_PASSWORD: ${OTEL_ELASTIC_PASSWORD:-E^3bT6*kM9&cW2$$z}
      OTEL_KIBANA_PASSWORD: ${OTEL_KIBANA_PASSWORD:-K&8qZ5%dL2*eU9^f}
    entrypoint: ["bash", "-c"]
    command:
      - |
        curl -s -X POST -u "elastic:$${OTEL_ELASTIC_PASSWORD}" \
          "http://otel-elasticsearch:9200/_security/user/kibana_system/_password" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$${OTEL_KIBANA_PASSWORD}\"}"
        echo " -> otel-elasticsearch: kibana_system password configured"
    networks:
      default: {}

  otel-kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    restart: unless-stopped
    profiles: ["platform"]
    labels:
      polaris.plane: platform
      polaris.role: observability
    environment:
      SERVER_PORT: "5602"
      ELASTICSEARCH_HOSTS: http://otel-elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${OTEL_KIBANA_PASSWORD:-K&8qZ5%dL2*eU9^f}
    ports:
      - "${OTEL_KIBANA_PORT:-5602}:5602"
    depends_on:
      otel-elasticsearch:
        condition: service_healthy
      otel-elasticsearch-init:
        condition: service_completed_successfully
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-otel-kibana
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:5602/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  otel_elasticsearch_data:

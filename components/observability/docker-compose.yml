services:
  elasticsearch-otel:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_OTEL_PASSWORD:-changeme}
      - ES_JAVA_OPTS=${ES_OTEL_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - es_otel_data:/usr/share/elasticsearch/data
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-elasticsearch-otel
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL -u elastic:${ELASTIC_OTEL_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch-otel-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: "no"
    depends_on:
      elasticsearch-otel:
        condition: service_healthy
    environment:
      ELASTIC_OTEL_PASSWORD: ${ELASTIC_OTEL_PASSWORD:-changeme}
      KIBANA_OTEL_PASSWORD: ${KIBANA_OTEL_PASSWORD:-changeme}
    entrypoint: ["bash", "-c"]
    command:
      - |
        curl -s -X POST -u "elastic:$${ELASTIC_OTEL_PASSWORD}" \
          "http://elasticsearch-otel:9200/_security/user/kibana_system/_password" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$${KIBANA_OTEL_PASSWORD}\"}"
        echo " -> elasticsearch-otel: kibana_system password configured"
    networks:
      default: {}

  kibana-otel:
    image: docker.elastic.co/kibana/kibana:8.15.0
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch-otel:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_OTEL_PASSWORD:-changeme}
    ports:
      - "${KIBANA_OTEL_PORT:-5602}:5601"
    depends_on:
      elasticsearch-otel:
        condition: service_healthy
      elasticsearch-otel-init:
        condition: service_completed_successfully
    networks:
      default: {}
      polaris-net:
        aliases:
          - base-kibana-otel
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  es_otel_data:
